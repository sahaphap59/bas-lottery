<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BAS LOTTERY - หน้าร้าน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Prompt', sans-serif; }
    .ticket-card { background: radial-gradient(circle at 2px 2px, rgba(0,0,0,0.05) 1px, transparent 0); background-size: 8px 8px; }
  </style>
</head>
<body class="bg-slate-100 pb-24">

  <header class="bg-[#da251d] text-white p-4 sticky top-0 z-50 shadow-lg">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="font-black text-xl tracking-tighter">BAS LOTTERY</h1>
      <div id="user-info" class="flex items-center gap-2">
        <button id="login-btn" onclick="lineLogin()" class="text-[10px] bg-white/20 px-4 py-2 rounded-full font-bold uppercase tracking-wider shadow-sm">👤 ล็อกอินเข้าสู่ระบบ</button>
      </div>
    </div>
  </header>

  <div class="bg-[#b91c1c] p-6 max-w-md mx-auto rounded-b-[30px] shadow-inner mb-6">
    <input type="number" id="searchInput" oninput="renderShop()" placeholder="🔍 ค้นหาเลขเด็ด 6 หลัก" class="w-full p-4 rounded-xl text-center text-2xl font-black tracking-[0.2em] outline-none shadow-xl focus:ring-4 focus:ring-white/30 transition text-slate-800">
    <p id="draw-label" class="text-center text-[11px] font-bold text-white/80 mt-3 uppercase tracking-widest">กำลังเชื่อมต่อข้อมูลแผง...</p>
  </div>

  <main class="max-w-md mx-auto px-4">
    <div id="lottery-grid" class="grid grid-cols-1 gap-4">
      <div class="text-center py-20 text-slate-400 font-bold">กำลังโหลดสลาก...</div>
    </div>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCjlBUSa8LEL4j7ORix2p9piAnBU8hvvCY",
      authDomain: "bas-lottery.firebaseapp.com",
      projectId: "bas-lottery",
      storageBucket: "bas-lottery.firebasestorage.app",
      messagingSenderId: "295311085507",
      appId: "1:295311085507:web:1cebd97dd85d7c9ca1b776"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    const LIFF_ID = "2010226176-jm6lSL41"; 

    let availableTickets = [];

    async function initLIFF() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          document.getElementById('user-info').innerHTML = `
            <img src="${profile.pictureUrl}" class="w-9 h-9 rounded-full border-2 border-white shadow-sm object-cover">
            <span class="text-[11px] font-bold text-white">${profile.displayName}</span>
          `;
        }
      } catch (e) { 
        console.error("LIFF Init Failed", e); 
      }
    }

    function lineLogin() {
      if (!liff.isLoggedIn()) {
        const cleanUrl = window.location.origin; 
        liff.login({ redirectUri: cleanUrl });
      }
    }

    function loadShop() {
      db.collection('draws').orderBy('createdAt', 'desc').limit(1).onSnapshot(snap => {
        if(snap.empty) {
          document.getElementById('lottery-grid').innerHTML = '<div class="text-center py-20 text-slate-400 font-bold">ยังไม่ได้ตั้งงวดสลากในระบบหลังบ้าน</div>';
          return;
        }
        
        const draw = snap.docs[0].data().name;
        document.getElementById('draw-label').innerText = `🎟️ ประจำงวด: ${draw}`;
        
        db.collection('lotteries')
          .where('draw', '==', draw)
          .where('status', '==', 'available')
          .onSnapshot(s => {
            availableTickets = [];
            s.forEach(doc => availableTickets.push({ id: doc.id, ...doc.data() }));
            renderShop();
          });
      });
    }

    function renderShop() {
      const search = document.getElementById('searchInput').value;
      let list = availableTickets;
      if (search) {
        list = list.filter(t => t.number.includes(search));
      }

      let html = '';
      list.forEach(t => {
        html += `
        <div class="bg-white rounded-2xl p-4 flex justify-between items-center shadow-sm ticket-card border border-slate-200">
          <div class="flex flex-col">
            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">สลากดิจิทัล</span>
            <span class="text-4xl font-black tracking-widest text-slate-800 drop-shadow-sm">${t.number}</span>
          </div>
          <div class="text-right flex flex-col items-end">
            <span class="text-[11px] font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md mb-2">ชุด ${t.quantity} ใบ</span>
            <button onclick="buy('${t.number}')" class="bg-[#da251d] hover:bg-[#b91c1c] text-white px-6 py-2 rounded-xl font-black text-sm shadow-md transition active:scale-95">🛒 ฿100</button>
          </div>
        </div>`;
      });

      document.getElementById('lottery-grid').innerHTML = html || '<div class="text-center py-20 text-slate-400 font-bold text-lg">✨ ไม่พบเลขที่ต้องการบนแผง ✨</div>';
    }

    function buy(num) {
      if (!liff.isLoggedIn()) {
        lineLogin();
        return;
      }
      window.location.href = `https://line.me/R/ti/p/@415mknnt?text=สนใจสั่งซื้อสลากเลข_${num}`;
    }

    initLIFF();
    loadShop();
  </script>
</body>
</html>
