<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แผงแอดมิน - BAS LOTTERY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans">
  <nav class="bg-slate-900 text-white p-4 shadow-xl">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="font-black text-xl text-amber-400">BAS ADMIN <span class="text-white text-xs">FIREBASE</span></h1>
      <div class="flex gap-2">
        <button onclick="goToShop()" class="bg-rose-500 hover:bg-rose-600 px-6 py-2 rounded-lg font-bold text-sm transition shadow-md">🏪 ไปหน้าร้าน</button>
      </div>
    </div>
  </nav>

  <div id="app" class="p-6 max-w-7xl mx-auto">
    <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex items-center justify-between border-l-4 border-amber-400">
      <div>
        <span class="text-gray-500 text-xs font-bold uppercase">งวดที่กำลังจัดการ:</span>
        <select id="drawSelect" onchange="loadTickets()" class="ml-2 font-black text-lg outline-none text-slate-800 bg-transparent"></select>
      </div>
      <div class="flex gap-2">
        <button onclick="createDraw()" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-lg hover:bg-indigo-100 transition">+ ตั้งงวดใหม่</button>
        <button onclick="openAddTicketModal()" class="text-sm font-bold text-amber-700 bg-amber-100 px-4 py-2 rounded-lg hover:bg-amber-200 transition">➕ ลงทะเบียนสลากใหม่</button>
        <button onclick="importFromSheets()" class="text-sm font-bold text-emerald-700 bg-emerald-100 px-4 py-2 rounded-lg hover:bg-emerald-200 transition">📥 ดูดข้อมูลจาก Sheets</button>
      </div>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="bg-white p-5 rounded-xl border-t-4 border-emerald-500 shadow-sm">
        <p class="text-xs text-gray-400 font-bold uppercase">สลากบนแผงรวม</p>
        <h2 id="count-available" class="text-3xl font-black text-slate-700">0</h2>
      </div>
      <div class="bg-white p-5 rounded-xl border-t-4 border-rose-500 shadow-sm">
        <p class="text-xs text-gray-400 font-bold uppercase">ค้างชำระ / รอตรวจ</p>
        <h2 id="count-sold" class="text-3xl font-black text-slate-700">0</h2>
      </div>
      <div class="bg-white p-5 rounded-xl border-t-4 border-indigo-500 shadow-sm">
        <p class="text-xs text-gray-400 font-bold uppercase">รายการสั่งซื้อทั้งหมด</p>
        <h2 id="count-total" class="text-3xl font-black text-slate-700">0</h2>
      </div>
      <div class="bg-white p-5 rounded-xl border-t-4 border-amber-500 shadow-sm">
        <p class="text-xs text-gray-400 font-bold uppercase">มูลค่ารวมงวดนี้</p>
        <h2 id="sum-amount" class="text-3xl font-black text-amber-600">฿0</h2>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-md overflow-hidden">
      <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
        <h3 class="font-bold text-slate-700">รายการสลากในระบบ</h3>
        <input type="text" id="searchInput" oninput="renderTable()" placeholder="🔍 ค้นหาเลข..." class="border border-slate-300 p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-amber-400 w-64">
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-slate-100 border-b">
            <tr class="text-xs font-bold text-slate-500 uppercase tracking-wider">
              <th class="p-4">เลขสลากดิจิทัล</th>
              <th class="p-4 text-center">จำนวน</th>
              <th class="p-4">ชื่อผู้ซื้อ</th>
              <th class="p-4 text-center">สถานะ</th>
              <th class="p-4 text-center">จัดการ</th>
            </tr>
          </thead>
          <tbody id="ticket-table" class="divide-y divide-slate-100 text-sm"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCjlBUSa8LEL4j7ORix2p9piAnBU8hvvCY",
      authDomain: "bas-lottery.firebaseapp.com",
      projectId: "bas-lottery",
      storageBucket: "bas-lottery.firebasestorage.app",
      messagingSenderId: "295311085507",
      appId: "1:295311085507:web:1cebd97dd85d7c9ca1b776"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allTickets = [];

    function goToShop() {
      const shopUrl = window.location.origin; 
      window.open(shopUrl, '_blank');
    }

    function loadDraws() {
      db.collection('draws').orderBy('createdAt', 'desc').onSnapshot(snap => {
        const sel = document.getElementById('drawSelect');
        sel.innerHTML = snap.docs.map(doc => `<option value="${doc.data().name}">${doc.data().name}</option>`).join('');
        if(sel.value) loadTickets();
      });
    }

    function loadTickets() {
      const draw = document.getElementById('drawSelect').value;
      db.collection('lotteries').where('draw', '==', draw).onSnapshot(snap => {
        allTickets = [];
        snap.forEach(doc => allTickets.push({ id: doc.id, ...doc.data() }));
        renderTable();
      });
    }

    function renderTable() {
      const search = document.getElementById('searchInput').value;
      const filtered = allTickets.filter(t => t.number.includes(search));
      
      let html = '';
      let stats = { available: 0, sold: 0, total: 0, amount: 0 };

      filtered.forEach(t => {
        stats.total++;
        if (t.status === 'available') stats.available++;
        else {
          stats.sold++;
          stats.amount += (t.amount || (t.quantity * 100));
        }

        let badge = t.status === 'available' ? 
          '<span class="bg-slate-100 text-slate-500 px-3 py-1 rounded-md font-bold text-xs border border-slate-200">✨ ว่างแผง</span>' : 
          '<span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-md font-bold text-xs border border-amber-200">🟡 รอตรวจสอบ</span>';

        html += `<tr class="hover:bg-slate-50 transition">
          <td class="p-4 font-mono font-black text-xl text-slate-800 tracking-widest">${t.number}</td>
          <td class="p-4 font-bold text-slate-600 text-center">${t.quantity}</td>
          <td class="p-4 font-bold text-slate-700">${t.name}</td>
          <td class="p-4 text-center">${badge}</td>
          <td class="p-4 text-center">
            <button onclick="deleteTicket('${t.id}')" class="bg-rose-50 text-rose-500 border border-rose-200 px-3 py-1.5 rounded-lg hover:bg-rose-100 font-bold text-xs transition">🗑️ ลบ</button>
          </td>
        </tr>`;
      });

      document.getElementById('ticket-table').innerHTML = html;
      document.getElementById('count-available').innerText = stats.available;
      document.getElementById('count-sold').innerText = stats.sold;
      document.getElementById('count-total').innerText = stats.total;
      document.getElementById('sum-amount').innerText = '฿' + stats.amount.toLocaleString();
    }

    function openAddTicketModal() {
      Swal.fire({
        title: 'ลงทะเบียนสลากใหม่',
        html: `
          <input id="swal-num" type="number" placeholder="เลข 6 หลัก" class="swal2-input text-center tracking-widest font-mono font-bold" maxlength="6">
          <input id="swal-qty" type="number" placeholder="จำนวนชุด (ใบ)" class="swal2-input text-center font-bold" value="1">
        `,
        focusConfirm: false,
        showCancelButton: true,
        confirmButtonText: '💾 บันทึกเข้าระบบ',
        confirmButtonColor: '#1e293b',
        preConfirm: () => {
          const num = document.getElementById('swal-num').value;
          const qty = parseInt(document.getElementById('swal-qty').value) || 1;
          if (!num || num.length !== 6) { Swal.showValidationMessage('กรุณากรอกเลขให้ครบ 6 หลัก'); return false; }
          return { num, qty };
        }
      }).then((result) => {
        if (result.isConfirmed) {
          const currentDraw = document.getElementById('drawSelect').value;
          const customId = currentDraw.replace(/\s+/g, '') + "_" + result.value.num;
          
          db.collection('lotteries').doc(customId).set({
            number: result.value.num,
            quantity: result.value.qty,
            amount: result.value.qty * 100,
            name: "-",
            status: "available",
            draw: currentDraw,
            createdAt: new Date()
          }, { merge: true }).then(() => {
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'เพิ่มสลากลงแผงแล้ว', showConfirmButton: false, timer: 1500 });
          });
        }
      });
    }

    function deleteTicket(id) {
      Swal.fire({ title: 'ลบสลากนี้ออกจากระบบ?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ลบทิ้ง' }).then(r => {
        if(r.isConfirmed) db.collection('lotteries').doc(id).delete();
      });
    }

    function createDraw() {
      Swal.fire({ title: 'ตั้งชื่องวดใหม่', input: 'text', inputPlaceholder: 'เช่น งวด 1 กรกฎาคม 2569' }).then(r => {
        if(r.value) db.collection('draws').add({ name: r.value.trim(), createdAt: new Date() });
      });
    }
    
    function importFromSheets() {
      if (typeof google === 'undefined') {
        Swal.fire('การดูดข้อมูลต้องทำผ่าน GAS', 'กรุณาเข้าลิงก์ Google Script อันเดิม (Web App) เพื่อกดปุ่มนี้ครับ', 'warning');
        return;
      }
      google.script.run.withSuccessHandler(res => {
        let options = res.sheets.map(s => `<option value="${s}">${s}</option>`).join('');
        Swal.fire({
          title: 'เลือกงวดใน Sheets',
          html: `<select id="swal-sheet" class="w-full p-3 border rounded-xl font-bold">${options}</select>`,
          showCancelButton: true,
          confirmButtonText: '⚡ เริ่มดูดข้อมูล'
        }).then(result => {
          if(result.isConfirmed) {
            const sheetName = document.getElementById('swal-sheet').value;
            const currentDraw = document.getElementById('drawSelect').value;
            Swal.fire({ title: 'กำลังดึงข้อมูลและกรองเลขซ้ำ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            google.script.run.withSuccessHandler(data => {
              const batch = db.batch();
              data.rows.forEach(row => {
                const customId = currentDraw.replace(/\s+/g, '') + "_" + row.number;
                const docRef = db.collection('lotteries').doc(customId);
                batch.set(docRef, { ...row, draw: currentDraw }, { merge: true });
              });
              
              batch.commit().then(() => {
                Swal.fire('อัปเดตเรียบร้อย!', 'ข้อมูลถูกนำเข้า Firebase แล้ว', 'success');
              });
            }).extractDataForMigration(sheetName);
          }
        });
      }).getSheetsList();
    }

    loadDraws();
  </script>
</body>
</html>
